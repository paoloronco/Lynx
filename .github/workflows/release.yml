name: Create GitHub Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - id: version
        name: Resolve release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./app/package.json').version")"
          SERVER_VERSION="$(node -p "require('./app/server/package.json').version")"

          if [ "$VERSION" != "$SERVER_VERSION" ]; then
            echo "::error::Frontend version ($VERSION) and backend version ($SERVER_VERSION) must match."
            exit 1
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must use X.X.X SemVer format, got: $VERSION"
            exit 1
          fi

          TAG="v${VERSION}"
          git fetch --tags origin

          TAG_EXISTS=false
          RELEASE_EXISTS=false

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_EXISTS=true
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi

          if [ "$RELEASE_EXISTS" = "true" ]; then
            echo "::notice::Release $TAG already exists. Skipping release creation."
          elif [ "$TAG_EXISTS" = "true" ]; then
            echo "::notice::Tag $TAG already exists. Reusing it to create the missing release."
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "release_exists=$RELEASE_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: ${{ steps.version.outputs.tag_exists != 'true' }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: ${{ steps.version.outputs.release_exists != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
