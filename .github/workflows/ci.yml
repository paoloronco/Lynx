name: Continuous Integration (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Quality Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LYNX

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            LYNX/package-lock.json
            LYNX/server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm run install:server

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        run: npm --prefix server audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

      - name: Run unit and integration tests (Vitest)
        run: npm run test:unit

      - name: Build frontend application
        run: npm run build

      - name: Build Docker image for smoke test
        run: docker build -t lynx-ci-smoke ..

      - name: Smoke test Docker image
        run: |
          docker run -d --name lynx-ci-smoke \
            -p 3001:8080 \
            -e JWT_SECRET=ci-smoke-secret-ci-smoke-secret-123456 \
            lynx-ci-smoke
          for attempt in {1..30}; do
            if curl --fail http://127.0.0.1:3001/health; then
              docker rm -f lynx-ci-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs lynx-ci-smoke
          docker rm -f lynx-ci-smoke
          exit 1

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e:ci
        continue-on-error: true

      - name: Upload Playwright test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: LYNX/playwright-report/
          retention-days: 30
        continue-on-error: true
