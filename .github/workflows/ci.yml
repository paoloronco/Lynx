name: Continuous Integration (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Quality Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate one-command installer
        working-directory: .
        run: |
          bash -n install.sh
          bash -n install-pve.sh
          bash -n scripts/test-installer.sh
          bash -n scripts/test-pve-installer.sh
          shellcheck install.sh install-pve.sh scripts/test-installer.sh scripts/test-pve-installer.sh
          sudo bash scripts/test-installer.sh
          sudo bash scripts/test-pve-installer.sh

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install backend dependencies
        run: npm --prefix server ci --prefer-offline --no-audit

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        run: npm --prefix server audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend application
        run: npm run build

      - name: Run unit and integration tests (Vitest)
        run: npm run test:unit

      - name: Build Docker image for smoke test
        run: docker build -t orbitpage-ci-smoke ..

      - name: Smoke test Docker image
        run: |
          set -Eeuo pipefail
          cleanup() {
            docker rm -f orbitpage-ci-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name orbitpage-ci-smoke \
            -p 3001:8080 \
            -e JWT_SECRET=ci-smoke-secret-ci-smoke-secret-123456 \
            orbitpage-ci-smoke
          for attempt in {1..45}; do
            if curl --fail http://127.0.0.1:3001/health --silent --show-error >/dev/null; then
              echo "Docker health check passed on attempt ${attempt}."
              exit 0
            fi
            sleep 1
          done
          docker logs orbitpage-ci-smoke
          exit 1

  e2e:
    name: E2E (${{ matrix.browser }})
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 22
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install backend dependencies
        run: npm --prefix server ci --prefer-offline --no-audit

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run isolated Playwright E2E tests
        run: npm run test:e2e:${{ matrix.browser }}
        timeout-minutes: 16

      - name: Upload Playwright test report
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: app/playwright-report/
          retention-days: 30
        continue-on-error: true
