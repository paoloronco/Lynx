name: Mirror to Gitea

on:
  push:
    branches: [ "**" ]
    tags: [ "**" ]
  delete:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push mirror to Gitea
        run: |
          git remote add gitea https://paoloronco:${{ secrets.GITEA_TOKEN }}@gitea.com/paoloronco/OrbitPage.git
          for attempt in 1 2 3; do
            if git push gitea --mirror; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 20))
              echo "Gitea mirror attempt $attempt failed; retrying in ${delay}s."
              sleep "$delay"
            fi
          done

          echo "Gitea mirror failed after 3 attempts."
          exit 1
